<script>
  (function() {
    
    const scrollBtn = document.createElement('div');
    scrollBtn.className = 'scroll-top';
    scrollBtn.innerHTML = '&#8679;';
    scrollBtn.setAttribute('role', 'button');
    scrollBtn.setAttribute('aria-label', 'Scroll to top');
    scrollBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    document.body.appendChild(scrollBtn);

    window.addEventListener('scroll', () => {
      if (window.scrollY > 400) {
        scrollBtn.classList.add('show');
      } else {
        scrollBtn.classList.remove('show');
      }
    }, { passive: true });

    
    var root = document.documentElement;
    var LS = window.localStorage;

    function getSaved(key, fallback) {
      try { var v = LS.getItem('a11y_' + key); return v !== null ? v : fallback; }
      catch(e) { return fallback; }
    }

    function saveSetting(key, val) {
      try { LS.setItem('a11y_' + key, val); } catch(e) {}
    }

    function applyFont(size) {
      root.classList.remove('a11y-font-sm', 'a11y-font-md', 'a11y-font-lg', 'a11y-font-xl');
      root.classList.add('a11y-font-' + size);
      saveSetting('font', size);
    }

    function applyHighContrast(on) {
      root.classList.toggle('a11y-high-contrast', on);
      saveSetting('hc', on ? '1' : '0');
    }

    function applyDarkMode(on) {
      root.classList.toggle('a11y-dark', on);
      saveSetting('dark', on ? '1' : '0');
    }

    
    var sizes = ['sm', 'md', 'lg', 'xl'];
    var labels = ['A-', 'A', 'A+', 'A++'];

    var panel = document.createElement('div');
    panel.className = 'a11y-panel';
    panel.setAttribute('role', 'dialog');
    panel.setAttribute('aria-label', 'Pengaturan aksesibilitas');
    panel.innerHTML =
      '<div class="a11y-panel-title">Aksesibilitas</div>' +
      '<div class="a11y-group">' +
        '<span class="a11y-group-label">Ukuran Huruf</span>' +
        '<div class="a11y-font-row">' +
          sizes.map(function(s, i) {
            return '<button class="a11y-font-btn" data-size="' + s + '" aria-label="Ukuran huruf ' + labels[i] + '">' + labels[i] + '</button>';
          }).join('') +
        '</div>' +
      '</div>' +
      '<div class="a11y-group">' +
        '<span class="a11y-group-label">Kontras Tinggi</span>' +
        '<div class="a11y-toggle" data-action="hc" role="button" tabindex="0" aria-label="Toggle kontras tinggi">' +
          '<span>Kontras Tinggi</span>' +
          '<span class="a11y-toggle-indicator"></span>' +
        '</div>' +
      '</div>' +
      '<div class="a11y-group">' +
        '<span class="a11y-group-label">Mode Gelap</span>' +
        '<div class="a11y-toggle" data-action="dark" role="button" tabindex="0" aria-label="Toggle mode gelap">' +
          '<span>Mode Gelap</span>' +
          '<span class="a11y-toggle-indicator"></span>' +
        '</div>' +
      '</div>';

    document.body.appendChild(panel);

    
    var btn = document.createElement('button');
    btn.className = 'a11y-btn';
    btn.setAttribute('aria-label', 'Buka pengaturan aksesibilitas');
    btn.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<circle cx="12" cy="12" r="10"/>' +
        '<circle cx="12" cy="10" r="3"/>' +
        '<path d="M7 20.66V19a4 4 0 0 1 4-4h2a4 4 0 0 1 4 4v1.66"/>' +
      '</svg>';
    document.body.appendChild(btn);

    var open = false;
    btn.addEventListener('click', function() {
      open = !open;
      panel.classList.toggle('open', open);
      btn.setAttribute('aria-expanded', String(open));
    });

    
    var currentFont = getSaved('font', 'md');
    applyFont(currentFont);
    if (getSaved('hc', '0') === '1') applyHighContrast(true);
    if (getSaved('dark', '0') === '1') applyDarkMode(true);

    
    var fontBtns = panel.querySelectorAll('.a11y-font-btn');
    fontBtns.forEach(function(b) {
      if (b.getAttribute('data-size') === currentFont) b.classList.add('active');
      b.addEventListener('click', function() {
        fontBtns.forEach(function(x) { x.classList.remove('active'); });
        b.classList.add('active');
        applyFont(b.getAttribute('data-size'));
      });
    });

    
    function setupToggle(selector, applyFn, isActive) {
      var el = panel.querySelector(selector);
      el.addEventListener('click', function() { toggleIt(el, applyFn); });
      el.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggleIt(el, applyFn);
        }
      });
      if (isActive) el.classList.add('on');
    }

    function toggleIt(el, fn) {
      var on = !el.classList.contains('on');
      el.classList.toggle('on', on);
      fn(on);
    }

    setupToggle('[data-action="hc"]', applyHighContrast, getSaved('hc', '0') === '1');
    setupToggle('[data-action="dark"]', applyDarkMode, getSaved('dark', '0') === '1');

    
    document.addEventListener('click', function(e) {
      if (open && !panel.contains(e.target) && !btn.contains(e.target)) {
        open = false;
        panel.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  })();
</script>

<script>
  (function() {
    var overlay = document.getElementById('search-overlay');
    var btn = document.getElementById('search-btn');
    var close = document.getElementById('search-close');
    var initialized = false;
    var pagefindUI;

    function openSearch() {
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      if (!initialized) {
        pagefindUI = new PagefindUI({
          element: '#search',
          showSubResults: true,
          showImages: false,
          autofocus: true
        });
        initialized = true;
      } else {
        setTimeout(function() {
          var input = overlay.querySelector('.pagefind-ui__search-input');
          if (input) input.focus();
        }, 100);
      }
    }

    function closeSearch() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    if (btn) {
      btn.addEventListener('click', openSearch);
    }
    if (close) {
      close.addEventListener('click', closeSearch);
    }
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeSearch();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeSearch();
    });
  })();
</script>
