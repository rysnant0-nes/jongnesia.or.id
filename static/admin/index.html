<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Jongnesia</title>
</head>
<body>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { background: #f9f9f9 !important; }
    [class*="login"] [class*="card"] {
      background: #f4d9ae !important;
      border: 5px dashed #000 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      padding: 2rem !important;
    }
    [class*="login"] [class*="logo"] {
      margin-bottom: 0.5rem !important;
    }
    .login-logo-wrapper {
      display: flex !important;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-logo-wrapper img {
      width: 28px !important;
      height: 28px !important;
    }
    .login-logo-text {
      font-family: 'Bowlby One', cursive;
      font-size: 18px;
      color: #000;
      letter-spacing: 1px;
    }
    [class*="login"] input {
      border: 3px solid #000 !important;
      border-radius: 0 !important;
      font-family: Poppins, sans-serif;
      background: #fff !important;
    }
    [class*="login"] input:focus {
      border-color: #009f8f !important;
      box-shadow: none !important;
    }
    [class*="login"] button[type="submit"] {
      background: #009f8f !important;
      border: 3px solid #000 !important;
      border-radius: 0 !important;
      font-family: 'Bowlby One', cursive !important;
      font-size: 14px !important;
      color: #fff !important;
      text-transform: uppercase;
      padding: 10px 20px !important;
      transform: rotate(-1deg);
      transition: 0.3s;
    }
    [class*="login"] button[type="submit"]:hover {
      background: #007a6e !important;
      transform: rotate(-1deg) scale(1.02);
    }
    [class*="login"] a {
      color: #009f8f !important;
      font-family: Poppins, sans-serif;
    }
    [class*="login"] a:hover {
      color: #007a6e !important;
    }
  </style>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }
    document.addEventListener("DOMContentLoaded", function() {
      var observer = new MutationObserver(function() {
        var logo = document.querySelector('[class*="logo"] img, [class*="Logo"] img');
        if (logo && !logo.parentElement.querySelector(".login-logo-text")) {
          var wrapper = document.createElement("div");
          wrapper.className = "login-logo-wrapper";
          logo.parentNode.insertBefore(wrapper, logo);
          wrapper.appendChild(logo);
          var text = document.createElement("span");
          text.className = "login-logo-text";
          text.textContent = "JONGNESIA";
          wrapper.appendChild(text);
          observer.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    });
  </script>
</body>
</html>
