<!DOCTYPE html>
<html lang="id" itemscope itemtype="https://schema.org/WebPage">
  <head>
    {{- partial "head.html" . -}}
    {{- block "style" . }}{{- end }}
  </head>
  <body>
    <a href="#content" class="skip-link">Langsung ke konten</a>
    {{- partial "header.html" . -}}
    <main id="content">{{- block "main" . }}{{- end }}</main>
    {{- partial "footer.html" . -}}
    {{- partial "search.html" . -}}
    {{- partial "bottomnav.html" . -}}
  </body>
</html>
