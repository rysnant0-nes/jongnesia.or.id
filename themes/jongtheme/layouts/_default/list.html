{{- define "main" }}
<div class="container" style="margin-top: 100px;">
  <h1 class="section-title mb-4">{{.Title}}</h1>
  <div class="row justify-content-center align-items-stretch h-100">
    {{ range .Paginator.Pages }}
    <div class="col-md-6 col-lg-4 mt-4 d-flex">
      <a href="{{.RelPermalink}}" class="text-decoration-none text-dark w-100">
        <div class="card h-100">
          {{ if .Params.ilustration }}
          <img src="{{.Params.ilustration}}" class="card-img-top" width="100%" height="200" alt="{{.Title}}" loading="lazy" style="object-fit: cover;" />
          {{ else }}
          <img src="/ilustration/noimage.png" class="card-img-top" width="100%" height="200" alt="{{.Title}}" loading="lazy" style="object-fit: cover;" />
          {{ end }}
          <div class="card-body d-flex align-items-center">
            <h5 class="card-title text-center w-100" style="font-family: 'Courier Prime', monospace; font-weight: bold;">{{.Title}}</h5>
          </div>
        </div>
      </a>
    </div>
    {{ end }}
  </div>
  <div class="pagi container d-flex justify-content-center mt-4">
    {{ template "_internal/pagination.html" . }}
  </div>
</div>
{{end}}
